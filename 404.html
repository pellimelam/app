<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script>
/* =========================
SPA ROUTING FIX (FINAL - PRODUCTION SAFE)
========================= */

(function(){

  // Capture full original path
  var path = location.pathname + location.search + location.hash;

  // 🔥 Redirect to /app with encoded path
  // This preserves deep routes like /app/notes
  location.replace("/app/?redirect=" + encodeURIComponent(path));

})();
</script>

</head>
<body></body>
</html>
