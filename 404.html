<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script>
/* =========================
SPA REDIRECT (FINAL - NO LOOP)
========================= */

(function(){

  var path = location.pathname;

  // 🔥 IMPORTANT: only redirect real deep routes
  if(path.startsWith("/app/") && path !== "/app/"){
    location.replace("/app/?redirect=" + encodeURIComponent(path));
    return;
  }

  // fallback
  location.replace("/app/");

})();
</script>

</head>
<body></body>
</html>
