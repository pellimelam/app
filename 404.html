<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script>
/* =========================
SPA ROUTING FIX (NO LOOP)
========================= */

(function(){

  var path = location.pathname + location.search + location.hash;

  // 🚨 STOP LOOP: if already has redirect, do nothing
  if(path.includes("redirect=")){
    location.replace("/app/");
    return;
  }

  // ✅ Single clean redirect
  location.replace("/app/?redirect=" + encodeURIComponent(path));

})();
</script>

</head>
<body></body>
</html>
